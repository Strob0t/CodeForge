    post:
      tags: [Conversations]
      summary: Bypass all pending HITL approvals for a conversation
      description: |
        Auto-approves all pending and future tool call requests for this
        conversation. Admin only. Useful for headless/CI mode.
      operationId: bypassConversationApprovals
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ConversationID"
      responses:
        "200":
          description: Approvals bypassed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "bypassed"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token obtained from POST /auth/login.
        Pass as: Authorization: Bearer <token>

  parameters:
    ProjectID:
      name: id
      in: path
      required: true
      description: Project UUID
      schema:
        type: string
        format: uuid

    ConversationID:
      name: id
      in: path
      required: true
      description: Conversation UUID
      schema:
        type: string
        format: uuid

    RunID:
      name: id
      in: path
      required: true
      description: Run ID
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    Forbidden:
      description: Insufficient permissions (role check failed)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, editor, viewer]
        tenant_id:
          type: string
          format: uuid
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        expires_in:
          type: integer
          description: Token lifetime in seconds
        user:
          $ref: "#/components/schemas/User"

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        repo_url:
          type: string
        status:
          type: string
          enum: [created, cloning, ready, error]
        config:
          type: object
          additionalProperties:
            type: string
          description: Project-level configuration (autonomy_level, policy_preset, etc.)
        workspace_path:
          type: string
          description: Absolute path to the local workspace (if adopted/cloned)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        repo_url:
          type: string
          description: Git clone URL (optional for local-only projects)
        local_path:
          type: string
          description: Local filesystem path to auto-adopt as workspace
        config:
          type: object
          additionalProperties:
            type: string
          description: |
            Project config map. Common keys:
            autonomy_level (1-5), policy_preset, execution_mode (mount/sandbox)

    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        title:
          type: string
        mode:
          type: string
          description: Active mode (coder, reviewer, architect, etc.)
        model:
          type: string
          description: LLM model in use
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system, tool]
        content:
          type: string
        tool_calls:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              arguments:
                type: string
        cost_usd:
          type: number
          format: double
        tokens_in:
          type: integer
          format: int64
        tokens_out:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    Run:
      type: object
      properties:
        id:
          type: string
        task_id:
          type: string
        agent_id:
          type: string
        project_id:
          type: string
          format: uuid
        mode_id:
          type: string
        policy_profile:
          type: string
        exec_mode:
          type: string
          enum: [mount, sandbox, hybrid]
        deliver_mode:
          type: string
          enum: ["", patch, commit-local, branch, pr]
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled, timeout, quality_gate]
        step_count:
          type: integer
        cost_usd:
          type: number
          format: double
        tokens_in:
          type: integer
          format: int64
        tokens_out:
          type: integer
          format: int64
        model:
          type: string
        output:
          type: string
        error:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DashboardStats:
      type: object
      properties:
        cost_today_usd:
          type: number
          format: double
        cost_today_delta_pct:
          type: number
          format: double
          description: Percentage change vs yesterday
        active_runs:
          type: integer
        success_rate_7d_pct:
          type: number
          format: double
        success_rate_delta_pct:
          type: number
          format: double
        active_agents:
          type: integer
        avg_cost_per_run_usd:
          type: number
          format: double
        avg_cost_delta_pct:
          type: number
          format: double
        token_usage_today:
          type: integer
          format: int64
        token_usage_delta_pct:
          type: number
          format: double
        error_rate_24h_pct:
          type: number
          format: double
        error_rate_delta_pct:
          type: number
          format: double

    UserDataExport:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        api_keys:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              prefix:
                type: string
              created_at:
                type: string
                format: date-time
        llm_keys:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              provider:
                type: string
              label:
                type: string
              key_prefix:
                type: string
              created_at:
                type: string
                format: date-time

    Mode:
      type: object
      properties:
        id:
          type: string
          description: Mode slug (e.g., coder, reviewer, architect)
        name:
          type: string
        description:
          type: string
        tools:
          type: array
          items:
            type: string
          description: Allowed tool names for this mode
        denied_tools:
          type: array
          items:
            type: string
          description: Explicitly denied tool names
        llm_model:
          type: string
          description: Preferred LLM model for this mode
        autonomy_level:
          type: integer
          minimum: 1
          maximum: 5
        system_prompt:
          type: string
        built_in:
          type: boolean
          description: Whether this is a built-in mode (cannot be deleted)

    CreateModeRequest:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          description: Mode slug (unique identifier)
        name:
          type: string
        description:
          type: string
        tools:
          type: array
          items:
            type: string
        denied_tools:
          type: array
          items:
            type: string
        llm_model:
          type: string
        autonomy_level:
          type: integer
          minimum: 1
          maximum: 5
        system_prompt:
          type: string

    MCPServer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        command:
          type: string
          description: Command to start the MCP server
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        transport:
          type: string
          enum: [stdio, http]
        url:
          type: string
          description: HTTP URL (for http transport)
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMCPServerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        transport:
          type: string
          enum: [stdio, http]
        url:
          type: string
        enabled:
          type: boolean
          default: true

    Channel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        project_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        member_count:
          type: integer
        created_at:
          type: string
          format: date-time

    PolicyProfile:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        rules:
          type: array
          items:
            type: object
            properties:
              pattern:
                type: string
              effect:
                type: string
                enum: [allow, deny, ask]
        built_in:
          type: boolean

    BenchmarkSuite:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        provider_name:
          type: string
        config:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    BenchmarkRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        suite_id:
          type: string
          format: uuid
        model:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        total_cases:
          type: integer
        passed_cases:
          type: integer
        cost_usd:
          type: number
          format: double
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    KnowledgeBase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        source_type:
          type: string
        source_uri:
          type: string
        index_status:
          type: string
          enum: [none, indexing, indexed, error]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
