  # -----------------------------------------------
  # Search
  # -----------------------------------------------
  /search/conversations:
    post:
      tags: [Conversations]
      summary: Full-text search across conversations
      description: |
        Searches conversation messages using PostgreSQL FTS with GIN index
        and ts_rank scoring.
      operationId: searchConversations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Search query string
                project_id:
                  type: string
                  format: uuid
                  description: Optional project filter
                limit:
                  type: integer
                  default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        conversation_id:
                          type: string
                          format: uuid
                        message_id:
                          type: string
                          format: uuid
                        content:
                          type: string
                        rank:
                          type: number
                          format: double
        "400":
          $ref: "#/components/responses/BadRequest"

