repos:
  # -- General ----------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  # -- Python (Ruff) -----------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      # 1) Sort imports
      - id: ruff-check
        name: ruff (sort imports)
        args: ["--select", "I", "--fix"]

      # 2) Lint/fix
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]

      # 3) Format
      - id: ruff-format

  # -- Go -----------------------------------------------------
  - repo: https://github.com/TekWizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      # Format
      - id: go-fmt

  # Go hooks (local: goimports, go vet, golangci-lint)
  # Optimized: only lint changed files/packages instead of ./...
  - repo: local
    hooks:
      - id: go-imports-repo
        name: go-imports-repo
        entry: goimports -l -d
        language: system
        types: [go]
        exclude: ^(data/|vendor/)

      - id: go-vet-repo-mod
        name: go-vet-repo-mod
        entry: bash -c 'pkgs=$(echo "$@" | xargs -n1 dirname | sort -u | sed "s|^|./|" | grep -v "^\./tests/"); if [ -n "$pkgs" ]; then go vet $pkgs; fi' --
        language: system
        pass_filenames: true
        types: [go]
        exclude: ^tests/

      - id: golangci-lint-repo-mod
        name: golangci-lint-repo-mod
        entry: golangci-lint run --new-from-rev=HEAD
        language: system
        pass_filenames: false
        types: [go]

  # -- TypeScript / JavaScript (ESLint + Prettier) ------------
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: frontend/node_modules/.bin/eslint --config frontend/eslint.config.js --fix
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        types: [file]

      - id: prettier
        name: prettier
        entry: frontend/node_modules/.bin/prettier --write --ignore-unknown
        language: system
        files: \.(ts|tsx|js|jsx|json|css|scss|html)$
        types: [file]
