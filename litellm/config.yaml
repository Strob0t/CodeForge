# LiteLLM Proxy Configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# Phase 26N: Wildcard routing - provider-level wildcards replace individual
# model entries. The Python worker selects the exact model name via the
# HybridRouter (or scenario-based routing), and LiteLLM routes directly.
#
# When intelligent routing is disabled (CODEFORGE_ROUTING_ENABLED=false),
# workers still use tag-based routing as a fallback. Tags are preserved
# on the wildcard entries for backwards compatibility.

model_list:
  # -- Local Models (Ollama) --
  - model_name: "ollama/*"
    litellm_params:
      model: "ollama/*"
      api_base: "http://host.docker.internal:11434"
      tags: ["background"]

  # -- OpenAI --
  - model_name: "openai/*"
    litellm_params:
      model: "openai/*"
      api_key: "os.environ/OPENAI_API_KEY"

  # -- Anthropic --
  - model_name: "anthropic/*"
    litellm_params:
      model: "anthropic/*"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  # -- Google Gemini --
  - model_name: "gemini/*"
    litellm_params:
      model: "gemini/*"
      api_key: "os.environ/GEMINI_API_KEY"

  # -- Groq (fast inference) --
  - model_name: "groq/*"
    litellm_params:
      model: "groq/*"
      api_key: "os.environ/GROQ_API_KEY"

  # -- Mistral AI --
  - model_name: "mistral/*"
    litellm_params:
      model: "mistral/*"
      api_key: "os.environ/MISTRAL_API_KEY"

router_settings:
  enable_tag_filtering: true
  # Reduced from 2: app-level retry in llm.py handles remaining retries
  num_retries: 1

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
  # Reduced from 2: app-level retry in llm.py handles remaining retries
  num_retries: 1

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
