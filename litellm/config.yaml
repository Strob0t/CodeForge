# LiteLLM Proxy Configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# Phase 26N: Wildcard routing - provider-level wildcards replace individual
# model entries. The Python worker selects the exact model name via the
# HybridRouter (or scenario-based routing), and LiteLLM routes directly.
#
# When intelligent routing is disabled (CODEFORGE_ROUTING_ENABLED=false),
# workers still use tag-based routing as a fallback. Tags are preserved
# on the wildcard entries for backwards compatibility.

model_list:
  # -- Local Models (Ollama) --
  # Higher timeout (600s) because local models on consumer hardware are slow.
  - model_name: "ollama/*"
    litellm_params:
      model: "ollama/*"
      api_base: "http://host.docker.internal:11434"
      timeout: 600
      tags: ["background"]

  # -- Local Models (LM Studio) --
  # LM Studio exposes an OpenAI-compatible API on port 1234.
  # Use model names like: lm_studio/qwen2.5-coder-32b-instruct
  # Higher timeout (600s) because local models on consumer hardware are slow.
  # Set LM_STUDIO_API_BASE env var to override (e.g. "http://192.168.1.100:1234/v1").
  # Default: host.docker.internal (reachable from Docker Desktop containers).
  - model_name: "lm_studio/*"
    litellm_params:
      model: "openai/*"
      api_base: "os.environ/LM_STUDIO_API_BASE"
      api_key: "lm-studio"
      timeout: 600
      tags: ["background"]

  # -- OpenAI --
  - model_name: "openai/*"
    litellm_params:
      model: "openai/*"
      api_key: "os.environ/OPENAI_API_KEY"

  # -- Anthropic --
  - model_name: "anthropic/*"
    litellm_params:
      model: "anthropic/*"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  # -- Google Gemini --
  - model_name: "gemini/*"
    litellm_params:
      model: "gemini/*"
      api_key: "os.environ/GEMINI_API_KEY"

  # -- Groq (fast inference) --
  - model_name: "groq/*"
    litellm_params:
      model: "groq/*"
      api_key: "os.environ/GROQ_API_KEY"

  # -- Mistral AI --
  - model_name: "mistral/*"
    litellm_params:
      model: "mistral/*"
      api_key: "os.environ/MISTRAL_API_KEY"

  # -- OpenRouter --
  - model_name: "openrouter/*"
    litellm_params:
      model: "openrouter/*"
      api_key: "os.environ/OPENROUTER_API_KEY"

  # -- Cerebras (fast inference) --
  - model_name: "cerebras/*"
    litellm_params:
      model: "cerebras/*"
      api_key: "os.environ/CEREBRAS_API_KEY"

  # -- GitHub Copilot --
  # Disabled: device-code auth blocks LiteLLM startup synchronously.
  # Copilot token exchange is handled by Go Core (internal/adapter/copilot/client.go).
  # - model_name: "github_copilot/*"
  #   litellm_params:
  #     model: "github_copilot/*"
  #     extra_headers:
  #       Editor-Version: "vscode/1.88.0"
  #       Copilot-Integration-Id: "vscode-chat"

  # -- Chutes (OpenAI-compatible) --
  - model_name: "chutes/*"
    litellm_params:
      model: "openai/*"
      api_base: "https://llm.chutes.ai/v1"
      api_key: "os.environ/CHUTES_API_KEY"

  # -- AihubMix (OpenAI-compatible) --
  - model_name: "aihubmix/*"
    litellm_params:
      model: "openai/*"
      api_base: "https://aihubmix.com/v1"
      api_key: "os.environ/AIHUBMIX_API_KEY"

router_settings:
  enable_tag_filtering: true
  # Reduced from 2: app-level retry in llm.py handles remaining retries
  num_retries: 1

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
  # Reduced from 2: app-level retry in llm.py handles remaining retries
  num_retries: 1
  # Query actual provider endpoints for wildcard model discovery.
  # Without this, LiteLLM expands wildcards from its internal model cost map,
  # showing hundreds of phantom models that providers don't actually offer.
  check_provider_endpoint: true

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
