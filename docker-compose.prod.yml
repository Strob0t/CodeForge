# Production Docker Compose for CodeForge
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Secret Management:
#   1. Generate secrets: ./scripts/generate-secrets.sh ./secrets
#   2. Or set env vars: POSTGRES_PASSWORD, LITELLM_MASTER_KEY, NATS_USER, NATS_PASS
#   Services read from /run/secrets/ first, then fall back to env vars.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "10"

services:
  # --- Infrastructure ---

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codeforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-codeforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_archive:/archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codeforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_line_prefix=%t [%p] %q%u@%d "
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/data/server.crt"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/data/server.key"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=test ! -f /archive/%f && cp %p /archive/%f"
      - "-c"
      - "archive_timeout=300"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging: *default-logging

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - "--jetstream"
      - "--store_dir"
      - "/data"
      - "--user"
      - "${NATS_USER:?NATS_USER is required}"
      - "--pass"
      - "${NATS_PASS:?NATS_PASS is required}"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "echo | nc -z localhost 4222"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging: *default-logging

  litellm:
    image: ghcr.io/berriai/litellm:v1.63.2
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    secrets:
      - litellm-master-key
      - postgres-password
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-codeforge}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-codeforge}?sslmode=require"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CHUTES_API_KEY: ${CHUTES_API_KEY:-}
      AIHUBMIX_API_KEY: ${AIHUBMIX_API_KEY:-}
      LM_STUDIO_API_BASE: ${LM_STUDIO_API_BASE:-http://host.docker.internal:1234/v1}
    volumes:
      - ./litellm:/app/data:ro
    command: ["--config", "/app/data/config.yaml", "--port", "4000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging: *default-logging

  # --- Application ---

  core:
    image: ${CORE_IMAGE:-ghcr.io/strob0t/codeforge-core:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    secrets:
      - litellm-master-key
      - postgres-password
      - nats-user
      - nats-pass
    environment:
      CODEFORGE_PORT: "8080"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-codeforge}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-codeforge}?sslmode=require"
      NATS_URL: "nats://${NATS_USER:?NATS_USER is required}:${NATS_PASS:?NATS_PASS is required}@nats:4222"
      LITELLM_BASE_URL: "http://litellm:4000"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
    ports:
      - "${CORE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - public
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    logging: *default-logging

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/strob0t/codeforge-worker:latest}
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    secrets:
      - litellm-master-key
      - postgres-password
      - nats-user
      - nats-pass
    environment:
      NATS_URL: "nats://${NATS_USER:?NATS_USER is required}:${NATS_PASS:?NATS_PASS is required}@nats:4222"
      LITELLM_BASE_URL: "http://litellm:4000"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-codeforge}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-codeforge}?sslmode=require"
    depends_on:
      nats:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import codeforge.consumer"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
    logging: *default-logging

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/strob0t/codeforge-frontend:latest}
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - public
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

secrets:
  litellm-master-key:
    file: ${SECRETS_DIR:-./secrets}/litellm-master-key
  postgres-password:
    file: ${SECRETS_DIR:-./secrets}/postgres-password
  nats-user:
    file: ${SECRETS_DIR:-./secrets}/nats-user
  nats-pass:
    file: ${SECRETS_DIR:-./secrets}/nats-pass

volumes:
  postgres_data:
  postgres_archive:
  nats_data:

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true
