name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-go:
    name: Go
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: codeforge
          POSTGRES_PASSWORD: codeforge_dev
          POSTGRES_DB: codeforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codeforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:2-alpine
        # FIX-113: NATS needs --jetstream and -m 8222 for full integration tests.
        # GHA services don't support `command`, so tests that need JetStream
        # should use the smoke test job (which starts NATS via docker compose)
        # or a step-based `docker run` with explicit command args.
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --health-cmd "wget -q --spider http://localhost:8222/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://codeforge:codeforge_dev@localhost:5432/codeforge?sslmode=disable
      NATS_URL: nats://localhost:4222

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Lint
        uses: golangci/golangci-lint-action@1481404843c368bc19ca9406f87d6e0fc97bdcfd # v7.0.0
        with:
          version: v2.1.6

      - name: Check circular imports
        run: go vet ./... 2>&1 | grep -i "import cycle" && exit 1 || true

  test-python:
    name: Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==2.1.1

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: poetry run ruff check .

      - name: Format check
        run: poetry run ruff format --check .

      - name: Test
        run: poetry run pytest -v

  test-frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [test-frontend]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@2f8dda6cf4de7d73b29853c3f29e73a01e297bd8 # v12.1.0
        with:
          configPath: frontend/lighthouserc.yaml
          uploadArtifacts: true

  contract:
    name: Contract Tests
    needs: [test-go, test-python]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install poetry==2.1.1
          poetry install --no-interaction

      - name: Generate Go contract fixtures
        run: go test ./internal/port/messagequeue/ -run Contract -v -count=1

      - name: Validate fixtures against Python models
        run: poetry run pytest workers/tests/test_nats_contracts.py -v

  # TODO: FIX-102: Add a dedicated integration test job that runs the full
  # stack (Go + Python + NATS + PostgreSQL + LiteLLM) with docker compose
  # and executes cross-language integration tests.

  smoke:
    name: Smoke Tests
    needs: [contract]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: codeforge
          POSTGRES_PASSWORD: codeforge
          POSTGRES_DB: codeforge
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      nats:
        image: nats:2-alpine
        # FIX-113: Same JetStream limitation as test-go NATS service above.
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --health-cmd "wget -q --spider http://localhost:8222/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SMOKE_SKIP_LLM: "true"
      SMOKE_SKIP_LITELLM: "true"
      SMOKE_BASE_URL: "http://localhost:8080"
      APP_ENV: development
      DATABASE_URL: "postgres://codeforge:codeforge@localhost:5432/codeforge?sslmode=disable"
      NATS_URL: "nats://localhost:4222"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"

      - name: Build backend
        run: go build -o codeforge ./cmd/codeforge/

      - name: Start backend
        run: ./codeforge &

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          if ! curl -s http://localhost:8080/health > /dev/null 2>&1; then
            echo "Backend failed to start within 60s"
            exit 1
          fi

      - name: Run smoke tests
        run: go test -tags=smoke -timeout=300s -count=1 -v ./tests/integration/...

      - name: Generate verification matrix
        if: always()
        run: bash scripts/verify-features.sh || true

      - name: Upload verification matrix
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verification-matrix
          path: /tmp/verification-summary.json
          retention-days: 30

  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Go vulnerability check
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"

      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4 && govulncheck ./...

      - name: Python dependency audit
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run pip-audit
        run: pip install pip-audit==2.9.0 poetry==2.1.1 poetry-plugin-export==1.8.0 && poetry export -f requirements.txt --without-hashes -o /tmp/requirements.txt && pip-audit -r /tmp/requirements.txt

      - name: Frontend dependency audit
        run: cd frontend && npm ci && npm audit --omit=dev --audit-level=high

      - name: Generate Go SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: sbom-go.spdx.json
          path: .

      - name: Generate Frontend SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: sbom-frontend.spdx.json
          path: frontend

  verify:
    name: Feature Verification
    needs: [test-go, test-python, contract]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install poetry==2.1.1
          poetry install --no-interaction

      - name: Run feature verification
        run: bash scripts/verify-features.sh
