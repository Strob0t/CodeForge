name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-go:
    name: Go
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: codeforge
          POSTGRES_PASSWORD: codeforge_dev
          POSTGRES_DB: codeforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codeforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "wget -q --spider http://localhost:8222/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://codeforge:codeforge_dev@localhost:5432/codeforge?sslmode=disable
      NATS_URL: nats://localhost:4222

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6

  test-python:
    name: Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: poetry run ruff check .

      - name: Format check
        run: poetry run ruff format --check .

      - name: Test
        run: poetry run pytest -v

  test-frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [test-frontend]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: frontend/lighthouserc.yaml
          uploadArtifacts: true

  contract:
    name: Contract Tests
    needs: [test-go, test-python]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Generate Go contract fixtures
        run: go test ./internal/port/messagequeue/ -run Contract -v -count=1

      - name: Validate fixtures against Python models
        run: poetry run pytest workers/tests/test_nats_contracts.py -v

  smoke:
    name: Smoke Tests
    needs: [contract]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: codeforge
          POSTGRES_PASSWORD: codeforge
          POSTGRES_DB: codeforge
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "wget -q --spider http://localhost:8222/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SMOKE_SKIP_LLM: "true"
      SMOKE_SKIP_LITELLM: "true"
      SMOKE_BASE_URL: "http://localhost:8080"
      APP_ENV: development
      DATABASE_URL: "postgres://codeforge:codeforge@localhost:5432/codeforge?sslmode=disable"
      NATS_URL: "nats://localhost:4222"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build backend
        run: go build -o codeforge ./cmd/codeforge/

      - name: Start backend
        run: ./codeforge &

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          if ! curl -s http://localhost:8080/health > /dev/null 2>&1; then
            echo "Backend failed to start within 60s"
            exit 1
          fi

      - name: Run smoke tests
        run: go test -tags=smoke -timeout=300s -count=1 -v ./tests/integration/...

      - name: Generate verification matrix
        if: always()
        run: bash scripts/verify-features.sh || true

      - name: Upload verification matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-matrix
          path: /tmp/verification-summary.json
          retention-days: 30

  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Go vulnerability check
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Python dependency audit
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pip-audit
        run: pip install pip-audit poetry poetry-plugin-export && poetry export -f requirements.txt --without-hashes -o /tmp/requirements.txt && pip-audit -r /tmp/requirements.txt

      - name: Frontend dependency audit
        run: cd frontend && npm ci && npm audit --omit=dev --audit-level=high

      - name: Generate Go SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-go.spdx.json
          path: .

      - name: Generate Frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-frontend.spdx.json
          path: frontend

  verify:
    name: Feature Verification
    needs: [test-go, test-python, contract]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run feature verification
        run: bash scripts/verify-features.sh
