x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "10"

services:
  jaeger:
    image: jaegertracing/all-in-one:1.67
    container_name: codeforge-jaeger
    logging: *default-logging
    profiles:
      - dev
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - codeforge

  playwright-mcp:
    image: mcp/playwright:latest
    container_name: codeforge-playwright
    logging: *default-logging
    profiles:
      - dev
    ipc: host
    shm_size: "1gb"
    user: "1000:1000"
    security_opt:
      - "no-new-privileges:true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    networks:
      - codeforge
    command:
      - "--browser"
      - "chromium"
      - "--isolated"
      - "--headless"
      - "--port"
      - "8001"
      - "--host"
      - "0.0.0.0"
      - "--allowed-hosts"
      - "*"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:8001/mcp').catch(() => process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1G

  postgres:
    image: postgres:18-alpine
    container_name: codeforge-postgres
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: codeforge
      POSTGRES_USER: codeforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codeforge_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 256mb
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=384MB
        -c max_connections=100
        -c log_line_prefix='%t [%p] %q%u@%d '
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='mkdir -p /var/lib/postgresql/data/archive && test ! -f /var/lib/postgresql/data/archive/%f && cp %p /var/lib/postgresql/data/archive/%f'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U codeforge" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - codeforge
    deploy:
      resources:
        limits:
          memory: 1G

  nats:
    image: nats:2-alpine
    container_name: codeforge-nats
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "4222:4222"
      - "8222:8222"
    command: [ "--jetstream", "--store_dir", "/data", "-m", "8222" ]
    volumes:
      - nats_data:/data
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - codeforge
    deploy:
      resources:
        limits:
          memory: 512M

  docs-mcp:
    image: ghcr.io/arabold/docs-mcp-server:latest
    container_name: codeforge-docs-mcp
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6280:6280"
      - "6281:6281"
    environment:
      OPENAI_API_KEY: "lm-studio"
      OPENAI_API_BASE: "http://host.docker.internal:1234/v1"
      DOCS_MCP_EMBEDDING_MODEL: "text-embedding-nomic-embed-text-v1.5"
    volumes:
      - docs_mcp_data:/data
      - docs_mcp_config:/config
    command: [ "mcp", "--protocol", "http", "--host", "0.0.0.0", "--port", "6280", "--no-logo" ]
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:6281" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - codeforge

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: codeforge-litellm
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-codeforge-dev}
      DATABASE_URL: postgresql://codeforge:${POSTGRES_PASSWORD:-codeforge_dev}@postgres:5432/codeforge
      OLLAMA_API_BASE: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CHUTES_API_KEY: ${CHUTES_API_KEY:-}
      AIHUBMIX_API_KEY: ${AIHUBMIX_API_KEY:-}
      LM_STUDIO_API_BASE: ${LM_STUDIO_API_BASE:-http://host.docker.internal:1234/v1}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: codeforge-litellm
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    volumes:
      - ${HOST_PROJECT_PATH:-.}/litellm:/app/data
    command: [ "--config", "/app/data/config.yaml", "--port", "4000" ]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - codeforge
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  pgdata:
    name: codeforge-pgdata
  nats_data:
    name: codeforge-nats-data
  docs_mcp_data:
    name: codeforge-docs-mcp-data
  docs_mcp_config:
    name: codeforge-docs-mcp-config

networks:
  codeforge:
    driver: bridge
    name: codeforge
